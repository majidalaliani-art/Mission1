services:
  - type: web
    name: mymission-app
    runtime: python
    buildCommand: "bash ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mymission-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

databases:
  - name: mymission-db
    plan: free
